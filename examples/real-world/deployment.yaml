apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: production
  labels:
    app: api-gateway
    tier: edge
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
        tier: edge
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: registry.example.eu/api:1.21.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: info
            - name: MAX_CONNS
              value: "1024"
          resources:
            requests:
              cpu: "0.25"
              memory: 256Mi
            limits:
              cpu: "0.5"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 20
        - name: sidecar
          image: registry.example.eu/envoy:1.29.0
          ports:
            - name: admin
              containerPort: 9901
              protocol: TCP
